<!DOCTYPE html>
<html>
<head>
    <title>Animation Gallery</title>

    <style>
	

	/* Container */
#quantum-atom {
    width: 300px;
    height: 300px;
    perspective: 800px;
    margin: 50px auto;
    position: relative;
    background: #111;
}

/* Nucleus */
#nucleus {
    width: 40px;
    height: 40px;
    background: red;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 30px red;
}

/* Electron clouds */
.electron-cloud {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    margin-left: -50px;
    margin-top: -50px;
    border: 2px solid rgba(0, 0, 255, 0.4);
    box-shadow: 0 0 20px rgba(0,0,255,0.3);
    transform-style: preserve-3d;
    animation: spinCloud 6s linear infinite;
}

/* Slightly offset different clouds */
.electron-cloud:nth-child(2) { animation-duration: 8s; transform: rotateX(30deg) rotateY(0deg); }
.electron-cloud:nth-child(3) { animation-duration: 10s; transform: rotateX(60deg) rotateY(120deg); }

/* 3D spin animation */
@keyframes spinCloud {
    0% { transform: rotateX(0deg) rotateY(0deg); }
    50% { transform: rotateX(180deg) rotateY(180deg); }
    100% { transform: rotateX(360deg) rotateY(360deg); }
}
	#jnv-logo-container {
    position: relative;
    width: 200px;
    height: 200px;
    margin: 50px auto;
    background: #87CEEB; /* sky */
    border-radius: 10px;
    overflow: hidden;
}

/* Rising Sun */
#sun {
    width: 60px;
    height: 60px;
    background: yellow;
    border-radius: 50%;
    position: absolute;
    bottom: -60px;
    left: 50%;
    transform: translateX(-50%);
    animation: riseSun 3s ease-in-out infinite alternate;
    box-shadow: 0 0 20px yellow;
}

/* Mountain */
#mountain {
    width: 0;
    height: 0;
    border-left: 100px solid transparent;
    border-right: 100px solid transparent;
    border-bottom: 80px solid #2E8B57; /* green mountain */
    position: absolute;
    bottom: 0;
    left: 0;
    animation: bounceMountain 3s ease-in-out infinite alternate;
}

/* Text Animation */
#jnv-text {
    position: absolute;
    width: 100%;
    text-align: center;
    bottom: 10px;
    font-size: 32px;
    font-weight: bold;
    color: white;
    text-shadow: 2px 2px 5px #000;
    animation: fadeText 3s ease-in-out infinite alternate;
}

/* Animations */
@keyframes riseSun {
    0% { bottom: -60px; }
    100% { bottom: 80px; }
}

@keyframes bounceMountain {
    0% { transform: translateY(0); }
    100% { transform: translateY(-10px); }
}

@keyframes fadeText {
    0% { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
}
	
	
	.bn31-scene {
  width: 400px;
  height: 200px;
  perspective: 1000px;  /* creates 3D depth */
  margin: 50px auto;
}

.bn31 {
  display: flex;
  justify-content: space-around;
  align-items: center;
  width: 100%;
  height: 100%;
  font-size: 80px;
  font-weight: bold;
  color: limegreen;
  text-shadow: 2px 2px 5px #0a0, -2px -2px 5px #0a0;
  transform-style: preserve-3d;
  animation: rotateBN31 8s linear infinite;
}

.bn31 span {
  display: inline-block;
  transform-style: preserve-3d;
  animation: rotateLetter 4s ease-in-out infinite alternate;
}

.bn31 span:nth-child(1) { animation-delay: 0s; }
.bn31 span:nth-child(2) { animation-delay: 0.5s; }
.bn31 span:nth-child(3) { animation-delay: 1s; }
.bn31 span:nth-child(4) { animation-delay: 1.5s; }

/* Whole word rotation */
@keyframes rotateBN31 {
  0%   { transform: rotateY(0deg) rotateX(0deg); }
  25%  { transform: rotateY(90deg) rotateX(180deg); }
  50%  { transform: rotateY(180deg) rotateX(360deg); }
  75%  { transform: rotateY(270deg) rotateX(180deg); }
  100% { transform: rotateY(360deg) rotateX(0deg); }
}

/* Individual letters rotation */
@keyframes rotateLetter {
  0% { transform: rotateY(0deg) rotateX(0deg); }
  25% { transform: rotateY(180deg) rotateX(90deg); }
  50% { transform: rotateY(360deg) rotateX(180deg); }
  75% { transform: rotateY(180deg) rotateX(270deg); }
  100% { transform: rotateY(0deg) rotateX(360deg); }
}
	
	.cube-scene {
  width: 200px;
  height: 200px;
  perspective: 800px; /* creates 3D perspective */
  margin: 50px auto;
}

.cube {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  animation: rotateCube 8s linear infinite; /* continuous rotation */
}

/* Cube faces */
.face {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(255, 165, 0, 0.8);
  border: 2px solid #fff;
  box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
}

/* Position each face in 3D space */
.front  { transform: rotateY(0deg) translateZ(100px); }
.back   { transform: rotateY(180deg) translateZ(100px); }
.right  { transform: rotateY(90deg) translateZ(100px); }
.left   { transform: rotateY(-90deg) translateZ(100px); }
.top    { transform: rotateX(90deg) translateZ(100px); }
.bottom { transform: rotateX(-90deg) translateZ(100px); }

/* Complex rotation animation */
@keyframes rotateCube {
  0%   { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
  25%  { transform: rotateX(180deg) rotateY(90deg) rotateZ(0deg); }
  50%  { transform: rotateX(180deg) rotateY(180deg) rotateZ(180deg); }
  75%  { transform: rotateX(360deg) rotateY(270deg) rotateZ(180deg); }
  100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
}
	#pendulum-container {
    position: relative;
    width: 10vw;       /* responsive width */
    max-width: 60px;
    height: 50vh;      /* vertical space for swing */
    margin: auto;
}

#pendulum-arm {
    width: 6px;
    height: 60%;             /* length of the pendulum */
    background: #fff;
    position: absolute;
    top: 0;
    left: 50%;
    transform-origin: top center;  /* swing around the top */
    transform: rotate(-45deg);     /* initial angle */
    animation: swing 2s ease-in-out infinite alternate; /* swing animation */
}

#pendulum-bob {
    width: 40px;
    height: 40px;
    background: orange;
    border-radius: 50%;
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 20px orange;  /* glowing effect */
}

/* Swing Animation Keyframes */
@keyframes swing {
    0% { transform: rotate(-45deg); }
    50% { transform: rotate(45deg); }
    100% { transform: rotate(-45deg); }
}
	/* ---------------- Solar System Container ---------------- */
#solar-system {
    width: 400px;
    height: 400px;
    position: relative;
    margin: 40px auto;
    background: #111;
    border: 2px solid white;
    border-radius: 50%;
}

/* Sun */
#sun {
    width: 60px;
    height: 60px;
    background: yellow;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 30px yellow;
}

/* Earth orbit (invisible path for rotation) */
#earth-orbit {
    width: 300px;
    height: 300px;
    position: absolute;
    top: 50%;
    left: 50%;
    margin-left: -150px;
    margin-top: -150px;
    border: 1px dashed rgba(255,255,255,0.2); /* optional orbit path */
    border-radius: 50%;
    animation: rotateEarth 10s linear infinite;
}

/* Earth */
#earth {
    width: 30px;
    height: 30px;
    background: blue;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 100%;
    margin-left: -15px;
    margin-top: -15px;
    box-shadow: 0 0 10px blue;
}

/* Moon orbit around Earth */
#moon-orbit {
    width: 60px;
    height: 60px;
    position: absolute;
    top: 50%;
    left: 50%;
    margin-left: -30px;
    margin-top: -30px;
    border-radius: 50%;
    animation: rotateMoon 2s linear infinite;
}

/* Moon */
#moon {
    width: 10px;
    height: 10px;
    background: gray;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 100%;
    margin-left: -5px;
    margin-top: -5px;
}

/* ---------------- Animations ---------------- */
@keyframes rotateEarth {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@keyframes rotateMoon {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
	
	
	
		/* ---------------- Car Scene Container ---------------- */
#car-box {
    width: 300px;
    height: 150px;
    border: 2px solid white;
    position: relative;
    overflow: hidden;
}

/* Sky */
.sky {
    position: absolute;
    width: 200%;
    height: 100%;
    background: linear-gradient(#4facfe, #00f2fe);
    animation: moveSky 20s linear infinite;
}

/* Mountains (slow) */
.mountains {
    position: absolute;
    bottom: 40px;
    width: 200%;
    height: 60px;
    background: linear-gradient(to top, #555, transparent);
    clip-path: polygon(0% 100%, 10% 60%, 20% 100%, 30% 50%, 40% 100%, 50% 60%, 60% 100%, 70% 55%, 80% 100%, 90% 60%, 100% 100%);
    animation: moveMountains 15s linear infinite;
}

/* Trees (medium speed) */
.trees {
    position: absolute;
    bottom: 40px;
    width: 200%;
    height: 40px;
    background: repeating-linear-gradient(
        to right,
        green 0px,
        green 10px,
        transparent 10px,
        transparent 40px
    );
    animation: moveTrees 6s linear infinite;
}

/* Road */
.road {
    position: absolute;
    bottom: 0;
    width: 200%;
    height: 40px;
    background: #222;
}

.road::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 4px;
    top: 18px;
    background: repeating-linear-gradient(
        to right,
        white 0px,
        white 20px,
        transparent 20px,
        transparent 40px
    );
    animation: moveRoad 2s linear infinite;
}

/* Car */
#car {
    width: 60px;
    height: 30px;
    background: orange;
    position: absolute;
    bottom: 45px;
    left: 120px;
    border-radius: 5px;
}

/* Wheels */
.wheel {
    width: 15px;
    height: 15px;
    background: black;
    border-radius: 50%;
    position: absolute;
    bottom: -8px;
    animation: spin 0.5s linear infinite;
}

.front { right: 5px; }
.back { left: 5px; }

/* ---------------- Animations ---------------- */
@keyframes moveSky {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
}

@keyframes moveMountains {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
}

@keyframes moveTrees {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
}

@keyframes moveRoad {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
		
		
        body {
            font-family: Arial, sans-serif;
            background: #222;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* ---------------- Welcome Animation ---------------- */
        #welcome {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeSlide 3s ease-in-out infinite alternate;
        }

        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateY(-20px); }
            50% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(20px); }
        }

        /* ---------------- Ball animation container ---------------- */
        #ball-box {
            width: 300px;
            height: 300px;
            border: 2px solid white;
            position: relative;
            overflow: hidden;
            margin-bottom: 50px;
        }

        #ball {
            width: 30px;
            height: 30px;
            background-color: red;
            border-radius: 50%;
            position: absolute;
        }

        /* ---------------- Rain animation container ---------------- */
        #rain-box {
            width: 300px;
            height: 300px;
            border: 2px solid white;
            position: relative;
            overflow: hidden;
            background: #111;
        }

        .drop {
            position: absolute;
            width: 2px;
            height: 10px;
            background: blue;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <!-- Welcome Animation -->
    <div id="welcome">Welcome to the Animation Gallery!</div>

    <!-- Bouncing Ball -->
    <div id="ball-box">
        <div id="ball"></div>
    </div>

    <!-- Rain & Lightning -->
    <div id="rain-box"></div>

    <script>
        // ---------------- Ball Animation ----------------
        var ball = document.getElementById("ball");
        var ballBox = document.getElementById("ball-box");
        var x = 0, y = 0;
        var dx = 2, dy = 2;
        var boxSize = 300, ballSize = 30;

        function animateBall() {
            x += dx; y += dy;
            if (x + ballSize > boxSize || x < 0) dx = -dx;
            if (y + ballSize > boxSize || y < 0) dy = -dy;
            ball.style.left = x + "px";
            ball.style.top = y + "px";
            requestAnimationFrame(animateBall);
        }
        animateBall();

        // ---------------- Rain + Lightning Animation ----------------
        (function () {
            var rainBox = document.getElementById("rain-box");
            var width = 300, height = 300;
            var drops = [], dropCount = 100;

            for (var i = 0; i < dropCount; i++) {
                var drop = document.createElement("div");
                drop.className = "drop";
                rainBox.appendChild(drop);
                drops.push({
                    el: drop,
                    x: Math.random() * width,
                    y: Math.random() * height,
                    speed: 2 + Math.random() * 3
                });
            }

            function animateRain() {
                drops.forEach(d => {
                    d.y += d.speed;
                    if (d.y > height) {
                        d.y = -10;
                        d.x = Math.random() * width;
                    }
                    d.el.style.left = d.x + "px";
                    d.el.style.top = d.y + "px";
                });
                requestAnimationFrame(animateRain);
            }

            function lightning() {
                var flash = document.createElement("div");
                flash.style.position = "absolute";
                flash.style.left = "0";
                flash.style.top = "0";
                flash.style.width = "100%";
                flash.style.height = "100%";
                flash.style.background = "white";
                flash.style.opacity = "0.8";
                rainBox.appendChild(flash);

                setTimeout(() => { flash.style.opacity = "0"; }, 50);
                setTimeout(() => { if(flash.parentNode) flash.parentNode.removeChild(flash); }, 200);

                setTimeout(lightning, 2000 + Math.random() * 5000);
            }

            animateRain();
            lightning();
        })();
		
		
		
		
    </script>
	
		<div id="car-box">
    <div class="sky"></div>
    <div class="mountains"></div>
    <div class="trees"></div>
    <div class="road"></div>

    <div id="car">
        <div class="wheel front"></div>
        <div class="wheel back"></div>
    </div>
</div>
<!-- Solar System Animation -->
<div id="solar-system">
    <div id="sun"></div>
    <div id="earth-orbit">
        <div id="earth">
            <div id="moon-orbit">
                <div id="moon"></div>
            </div>
        </div>
    </div>
</div>
<div id="pendulum-container">
    <div id="pendulum-arm">
        <div id="pendulum-bob"></div>
    </div>
</div>
	<div class="cube-scene">
  <div class="cube">
    <div class="face front"></div>
    <div class="face back"></div>
    <div class="face right"></div>
    <div class="face left"></div>
    <div class="face top"></div>
    <div class="face bottom"></div>
  </div>
</div>

<div class="bn31-scene">
  <div class="bn31">
    <span>B</span>
    <span>N</span>
    <span>3</span>
    <span>1</span>
  </div>
</div>
<!-- JNV Logo Animation -->
<div id="jnv-logo-container">
    <div id="sun"></div>
    <div id="mountain"></div>
    <div id="jnv-text">JNV</div>
</div>
<div id="quantum-atom">
    <div id="nucleus"></div>
    <div class="electron-cloud"></div>
    <div class="electron-cloud"></div>
    <div class="electron-cloud"></div>
</div>
